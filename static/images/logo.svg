<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 280 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular design element background -->
  <circle cx="18" cy="30" r="16" fill="none" stroke="currentColor" stroke-width="1" opacity="0.1"/>
  
  <!-- Consistent circular tech pattern -->
  <g id="tech-pattern" opacity="0.25">
    <circle cx="18" cy="22" r="2" fill="currentColor"/>
    <circle cx="12" cy="32" r="1.5" fill="currentColor"/>
    <circle cx="24" cy="34" r="1.5" fill="currentColor"/>
    <line x1="18" y1="22" x2="12" y2="32" stroke="currentColor" stroke-width="1"/>
    <line x1="18" y1="22" x2="24" y2="34" stroke="currentColor" stroke-width="1"/>
    <line x1="12" y1="32" x2="24" y2="34" stroke="currentColor" stroke-width="1"/>
  </g>
  
  <!-- Main logo text -->
  <text x="45" y="30" font-family="'Verdana', sans-serif" font-size="22" font-weight="bold" fill="currentColor">AI Engineer</text>
  <text x="45" y="50" font-family="'Verdana', sans-serif" font-size="16" font-weight="300" fill="currentColor" opacity="0.8">Guide</text>
</svg> 
