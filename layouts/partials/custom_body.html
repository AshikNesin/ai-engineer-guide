<!-- Search modal -->
<div class="search-overlay" id="search-overlay">
  <div class="search-modal" role="dialog" aria-modal="true" aria-label="Search">
    <input type="text" class="search-modal-input" id="search-input" placeholder="Search posts..." autocomplete="off">
    <div class="search-modal-spinner" id="search-spinner" style="display:none"></div>
    <div id="search-results" aria-live="polite"></div>
  </div>
</div>

<script>
(function() {
  var overlay = document.getElementById('search-overlay');
  var input = document.getElementById('search-input');
  var spinner = document.getElementById('search-spinner');
  var results = document.getElementById('search-results');
  var trigger = document.getElementById('search-trigger');
  var currentController = null;
  var debounceTimer = null;

  function openModal() {
    overlay.classList.add('active');
    input.value = '';
    results.innerHTML = '';
    spinner.style.display = 'none';
    setTimeout(function() { input.focus(); }, 50);
  }

  function closeModal() {
    overlay.classList.remove('active');
    input.value = '';
    results.innerHTML = '';
    spinner.style.display = 'none';
    if (currentController) { currentController.abort(); currentController = null; }
    if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
    if (trigger) trigger.focus();
  }

  if (trigger) {
    trigger.addEventListener('click', function(e) {
      e.preventDefault();
      if (overlay.classList.contains('active')) { closeModal(); }
      else { openModal(); }
    });
  }

  document.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      if (overlay.classList.contains('active')) { closeModal(); }
      else { openModal(); }
    }
    if (e.key === 'Escape' && overlay.classList.contains('active')) {
      closeModal();
    }
    if (e.key === 'Tab' && overlay.classList.contains('active')) {
      var focusable = overlay.querySelectorAll('input, [tabindex="0"], button, a[href]');
      if (focusable.length === 0) return;
      var first = focusable[0];
      var last = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault();
        last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault();
        first.focus();
      }
    }
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });

  input.addEventListener('input', function() {
    var query = input.value.trim();
    if (debounceTimer) clearTimeout(debounceTimer);

    if (!query) {
      results.innerHTML = '';
      spinner.style.display = 'none';
      if (currentController) { currentController.abort(); currentController = null; }
      return;
    }

    debounceTimer = setTimeout(function() {
      if (currentController) currentController.abort();
      currentController = new AbortController();

      spinner.style.display = 'block';
      results.innerHTML = '';

      fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: query, limit: 5 }),
        signal: currentController.signal
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        spinner.style.display = 'none';
        if (!data.success || !data.data || !data.data.items || data.data.items.length === 0) {
          results.innerHTML = '<div class="search-modal-message">No results for "' + escapeHtml(query) + '"</div>';
          return;
        }
        var html = '';
        data.data.items.forEach(function(item) {
          var excerpt = item.excerpt || '';
          if (excerpt.length > 120) excerpt = excerpt.substring(0, 120) + '...';
          var tags = '';
          if (item.tags && item.tags.length > 0) {
            var visibleTags = item.tags.slice(0, 3);
            tags = '<div class="search-result-tags">' + visibleTags.map(function(t) { return '<span class="search-result-tag">' + escapeHtml(t) + '</span>'; }).join('') + '</div>';
          }
          html += '<a href="' + escapeHtml(item.url || '/' + (item.postType || 'blog') + '/' + (item.slug || '') + '/') + '" class="search-result-item" tabindex="0">'
            + '<div class="search-result-title">' + escapeHtml(item.title || '') + '</div>'
            + '<div class="search-result-excerpt">' + escapeHtml(excerpt) + '</div>'
            + tags
            + '</a>';
        });
        results.innerHTML = html;
      })
      .catch(function(err) {
        if (err.name === 'AbortError') return;
        spinner.style.display = 'none';
        results.innerHTML = '<div class="search-modal-message">Search is unavailable. Try again.</div>';
      });
    }, 300);
  });

  results.addEventListener('click', function(e) {
    var link = e.target.closest('.search-result-item');
    if (link) closeModal();
  });

  results.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var link = e.target.closest('.search-result-item');
      if (link) { window.location.href = link.href; }
    }
  });

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }
})();
</script>
