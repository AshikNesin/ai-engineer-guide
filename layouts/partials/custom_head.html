<!-- Logo styles -->
<style>
  .title {
    display: inline-block;
    margin-bottom: 20px;
  }
  
  .title img {
    vertical-align: middle;
    max-width: 100%;
    height: auto;
    /* Default desktop size */
    width: 280px;
    height: 60px;
  }
  
  /* Responsive logo sizing - Much larger sizes */
  @media (max-width: 768px) {
    .title img {
      width: 240px;
      height: 51px;
    }
  }
  
  @media (max-width: 480px) {
    .title img {
      width: 220px;
      height: 47px;
    }
  }
  
  @media (max-width: 320px) {
    .title img {
      width: 200px;
      height: 43px;
    }
  }
  
  /* Ensure proper spacing with navigation */
  header {
    margin-bottom: 20px;
  }
  
  nav {
    margin-top: 15px;
  }
  
  .header-flex {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header-flex nav {
    margin-top: 0;
  }
  .header-flex .title {
    margin-bottom: 0;
  }
</style>

<!-- Search modal styles -->
<style>
  .search-bar-trigger {
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    height: 34px;
    padding: 0 12px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1;
    color: #888;
    background: transparent;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    vertical-align: middle;
    min-width: 180px;
    max-width: 260px;
  }
  .search-bar-trigger:hover {
    border-color: rgba(0,0,0,0.25);
  }
  .search-bar-trigger:focus {
    outline: none;
    border-color: #3273dc;
    box-shadow: 0 0 0 2px rgba(50,115,220,0.15);
  }
  .search-bar-left {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    overflow: hidden;
  }
  .search-bar-placeholder {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #search-kbd {
    flex-shrink: 0;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #f2f2f2;
    color: #666;
    line-height: 1.3;
  }
  @media (max-width: 600px) {
    .search-bar-trigger {
      min-width: auto;
      max-width: none;
      padding: 0 8px;
    }
    .search-bar-placeholder { display: none; }
    #search-kbd { display: none; }
  }

  @media (prefers-color-scheme: dark) {
    .search-bar-trigger {
      color: #aaa;
      border-color: rgba(255,255,255,0.12);
    }
    .search-bar-trigger:hover {
      border-color: rgba(255,255,255,0.25);
    }
    .search-bar-trigger:focus {
      border-color: #8cc2dd;
      box-shadow: 0 0 0 2px rgba(140,194,221,0.15);
    }
    #search-kbd {
      background: #444;
      border-color: #555;
      color: #aaa;
    }
  }

  .search-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9998;
  }
  .search-overlay.active { display: flex; }

  .search-modal {
    position: fixed;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 500px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    z-index: 9999;
    overflow: hidden;
  }
  .search-modal.active { display: block; }

  .search-modal-input {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: none;
    border-bottom: 1px solid #eee;
    outline: none;
    background: transparent;
    color: #444;
    box-sizing: border-box;
  }

  .search-modal-results {
    max-height: 350px;
    overflow-y: auto;
  }

  .search-modal-spinner {
    display: none;
    text-align: center;
    padding: 20px;
  }
  .search-modal-spinner.active { display: block; }
  .search-modal-spinner::after {
    content: '';
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #eee;
    border-top-color: #3273dc;
    border-radius: 50%;
    animation: search-spin 0.6s linear infinite;
  }
  @keyframes search-spin {
    to { transform: rotate(360deg); }
  }

  .search-result-item {
    display: block;
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  .search-result-item:hover,
  .search-result-item:focus {
    background: #f7f7f7;
    outline: none;
  }
  .search-result-item:last-child { border-bottom: none; }

  .search-result-title {
    font-weight: 600;
    color: #222;
    margin-bottom: 4px;
    font-size: 14px;
  }
  .search-result-excerpt {
    font-size: 13px;
    color: #666;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .search-result-tags {
    margin-top: 4px;
    display: flex;
    gap: 4px;
    flex-wrap: nowrap;
    overflow: hidden;
  }
  .search-result-tag {
    font-size: 11px;
    background: #f0f0f0;
    color: #666;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .search-modal-message {
    padding: 20px 16px;
    text-align: center;
    color: #888;
    font-size: 14px;
  }

  @media (prefers-color-scheme: dark) {
    .search-modal {
      background: #333;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .search-modal-input {
      color: #ddd;
      border-bottom-color: #444;
    }
    .search-result-item:hover,
    .search-result-item:focus {
      background: #3a3a3a;
    }
    .search-result-title { color: #eee; }
    .search-result-excerpt { color: #aaa; }
    .search-result-tag {
      background: #444;
      color: #aaa;
    }
    .search-modal-message { color: #aaa; }
    .search-modal-spinner::after {
      border-color: #444;
      border-top-color: #8cc2dd;
    }
    #search-kbd {
      background: #444;
      border-color: #555;
      color: #aaa;
    }
  }
</style>
