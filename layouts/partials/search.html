{{ $searchApi := "/api/search" }}

<style>
    .search-bar-trigger {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        height: 34px;
        padding: 0 12px;
        font-family: inherit;
        font-size: 13px;
        line-height: 1;
        color: #888;
        background: transparent;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 8px;
        cursor: pointer;
        transition:
            border-color 0.15s,
            box-shadow 0.15s;
        vertical-align: middle;
        min-width: 180px;
        max-width: 260px;
    }
    .search-bar-trigger:hover {
        border-color: rgba(0, 0, 0, 0.25);
    }
    .search-bar-trigger:focus {
        outline: none;
        border-color: #3273dc;
        box-shadow: 0 0 0 2px rgba(50, 115, 220, 0.15);
    }
    .search-bar-left {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        overflow: hidden;
    }
    .search-bar-placeholder {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    #search-kbd {
        flex-shrink: 0;
        font-family: inherit;
        font-size: 11px;
        font-weight: 600;
        padding: 2px 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #f2f2f2;
        color: #666;
        line-height: 1.3;
    }
    @media (max-width: 600px) {
        .search-bar-trigger {
            min-width: auto;
            max-width: none;
            padding: 0 8px;
        }
        .search-bar-placeholder {
            display: none;
        }
        #search-kbd {
            display: none;
        }
    }

    .search-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9998;
    }
    .search-overlay.active {
        display: flex;
    }

    .search-modal {
        position: fixed;
        top: 15%;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 500px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        z-index: 9999;
        overflow: hidden;
    }

    .search-modal-input {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        border: none;
        border-bottom: 1px solid #eee;
        outline: none;
        background: transparent;
        color: #444;
        box-sizing: border-box;
    }

    .search-modal-spinner {
        display: none;
        text-align: center;
        padding: 20px;
    }
    .search-modal-spinner.active {
        display: block;
    }
    .search-modal-spinner::after {
        content: "";
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #eee;
        border-top-color: #3273dc;
        border-radius: 50%;
        animation: search-spin 0.6s linear infinite;
    }
    @keyframes search-spin {
        to {
            transform: rotate(360deg);
        }
    }

    #search-results {
        max-height: 60vh;
        overflow-y: auto;
    }
    #search-results:not(:empty) {
        padding: 16px;
    }

    .search-result-item {
        display: block;
        border: 1px solid #e8e8e8;
        border-radius: 8px;
        margin-bottom: 0.75rem;
        transition:
            border-color 0.15s,
            box-shadow 0.15s;
    }
    .search-result-item:hover {
        border-color: #3273dc;
        box-shadow: 0 2px 8px rgba(50, 115, 220, 0.08);
        background: transparent;
    }
    .search-result-item:last-child {
        margin-bottom: 0;
    }

    .search-result-link {
        display: block;
        padding: 12px 16px 4px;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
    }
    .search-result-link:focus {
        outline: none;
    }

    .search-result-title {
        font-weight: 600;
        color: #222;
        margin-bottom: 4px;
        font-size: 14px;
    }
    .search-result-excerpt {
        font-size: 13px;
        color: #666;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .search-result-tags {
        margin-top: 0;
        padding: 0 16px 12px;
        display: flex;
        gap: 4px;
        flex-wrap: nowrap;
        overflow: hidden;
    }
    .search-result-tag {
        font-size: 11px;
        background: #f0f0f0;
        color: #666;
        padding: 1px 6px;
        border-radius: 3px;
        white-space: nowrap;
        text-decoration: none;
        transition: background 0.15s, color 0.15s;
    }
    .search-result-tag:hover {
        background: rgba(50, 115, 220, 0.1);
        color: #3273dc;
    }

    .search-modal-message {
        padding: 4px 0;
        text-align: center;
        color: #888;
        font-size: 14px;
    }

    @media (prefers-color-scheme: dark) {
        .search-bar-trigger {
            color: #aaa;
            border-color: rgba(255, 255, 255, 0.12);
        }
        .search-bar-trigger:hover {
            border-color: rgba(255, 255, 255, 0.25);
        }
        .search-bar-trigger:focus {
            border-color: #8cc2dd;
            box-shadow: 0 0 0 2px rgba(140, 194, 221, 0.15);
        }
        #search-kbd {
            background: #444;
            border-color: #555;
            color: #aaa;
        }

        .search-modal {
            background: #333;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .search-modal-input {
            color: #ddd;
            border-bottom-color: #444;
        }
        .search-result-item {
            border-color: #444;
        }
        .search-result-item:hover,
        .search-result-item:focus {
            border-color: #8cc2dd;
            box-shadow: 0 2px 8px rgba(140, 194, 221, 0.08);
            background: transparent;
        }
        .search-result-title {
            color: #eee;
        }
        .search-result-excerpt {
            color: #aaa;
        }
        .search-result-tag {
            background: #444;
            color: #aaa;
            text-decoration: none;
        }
        .search-result-tag:hover {
            background: rgba(140, 194, 221, 0.15);
            color: #8cc2dd;
        }
        .search-modal-message {
            color: #aaa;
        }
        .search-modal-spinner::after {
            border-color: #444;
            border-top-color: #8cc2dd;
        }
    }
</style>

<button
    type="button"
    id="search-trigger"
    aria-label="Search blog"
    class="search-bar-trigger"
>
    <span class="search-bar-left">
        <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <span class="search-bar-placeholder">Search...</span>
    </span>
    <kbd id="search-kbd">⌘K</kbd>
</button>

<div class="search-overlay" id="search-overlay">
    <div
        class="search-modal"
        role="dialog"
        aria-modal="true"
        aria-label="Search"
    >
        <input
            type="text"
            class="search-modal-input"
            id="search-input"
            placeholder="Search posts..."
            autocomplete="off"
        />
        <div
            class="search-modal-spinner"
            id="search-spinner"
            style="display: none"
        ></div>
        <div id="search-results" aria-live="polite"></div>
    </div>
</div>

<script>
    (function () {
        var overlay = document.getElementById("search-overlay");
        var input = document.getElementById("search-input");
        var spinner = document.getElementById("search-spinner");
        var results = document.getElementById("search-results");
        var trigger = document.getElementById("search-trigger");
        var currentController = null;
        var debounceTimer = null;
        var trackingTimer = null;
        var searchApi = "{{ $searchApi }}";

        function openModal() {
            overlay.classList.add("active");
            input.value = "";
            results.innerHTML = "";
            spinner.style.display = "none";
            setTimeout(function () {
                input.focus();
            }, 50);
        }

        function closeModal() {
            overlay.classList.remove("active");
            input.value = "";
            results.innerHTML = "";
            spinner.style.display = "none";
            if (currentController) {
                currentController.abort();
                currentController = null;
            }
            if (debounceTimer) {
                clearTimeout(debounceTimer);
                debounceTimer = null;
            }
            if (trackingTimer) {
                clearTimeout(trackingTimer);
                trackingTimer = null;
            }
            if (trigger) trigger.focus();
        }

        if (trigger) {
            trigger.addEventListener("click", function (e) {
                e.preventDefault();
                if (overlay.classList.contains("active")) closeModal();
                else openModal();
            });
        }

        document.addEventListener("keydown", function (e) {
            if ((e.metaKey || e.ctrlKey) && e.key === "k") {
                e.preventDefault();
                if (overlay.classList.contains("active")) closeModal();
                else openModal();
            }
            if (e.key === "Escape" && overlay.classList.contains("active"))
                closeModal();
            if (e.key === "Tab" && overlay.classList.contains("active")) {
                var focusable = overlay.querySelectorAll(
                    'input, [tabindex="0"], button, a[href]',
                );
                if (focusable.length === 0) return;
                var first = focusable[0];
                var last = focusable[focusable.length - 1];
                if (e.shiftKey && document.activeElement === first) {
                    e.preventDefault();
                    last.focus();
                } else if (!e.shiftKey && document.activeElement === last) {
                    e.preventDefault();
                    first.focus();
                }
            }
        });

        overlay.addEventListener("click", function (e) {
            if (e.target === overlay) closeModal();
        });

        input.addEventListener("input", function () {
            var query = input.value.trim();
            if (debounceTimer) clearTimeout(debounceTimer);
            if (trackingTimer) clearTimeout(trackingTimer);

            if (!query) {
                results.innerHTML = "";
                spinner.style.display = "none";
                if (currentController) {
                    currentController.abort();
                    currentController = null;
                }
                return;
            }

            debounceTimer = setTimeout(function () {
                if (currentController) currentController.abort();
                currentController = new AbortController();

                spinner.style.display = "block";
                results.innerHTML = "";

                if (window.umami && typeof window.umami.track === 'function') {
                    trackingTimer = setTimeout(function () {
                        window.umami.track('search-request', { 'search-term': query });
                    }, 1000);
                }

                fetch(searchApi, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: query, limit: 5 }),
                    signal: currentController.signal,
                })
                    .then(function (res) {
                        return res.json();
                    })
                    .then(function (data) {
                        spinner.style.display = "none";
                        if (
                            !data.success ||
                            !data.data ||
                            !data.data.items ||
                            data.data.items.length === 0
                        ) {
                            results.innerHTML =
                                '<div class="search-modal-message">No results for "' +
                                escapeHtml(query) +
                                '"</div>';
                            return;
                        }
                        var html = "";
                        data.data.items.forEach(function (item) {
                            var excerpt = item.excerpt || "";
                            if (excerpt.length > 120)
                                excerpt = excerpt.substring(0, 120) + "...";
                            var tags = "";
                            if (item.tags && item.tags.length > 0) {
                                var visibleTags = item.tags.slice(0, 3);
                                tags =
                                    '<div class="search-result-tags">' +
                                    visibleTags
                                        .map(function (t) {
                                            return (
                                                '<a href="https://aiengineerguide.com/tags/' +
                                                encodeURIComponent(t) +
                                                '" class="search-result-tag" target="_blank" rel="noopener noreferrer">' +
                                                escapeHtml(t) +
                                                "</a>"
                                            );
                                        })
                                        .join("") +
                                    "</div>";
                            }
                            let url = item.url || `${window.location.origin}/${item.slug}`;
                            url = sanitizeUrl(url);
                            html +=
                                '<div class="search-result-item">' +
                                '<a href="' +
                                escapeHtml(url) +
                                '" class="search-result-link" data-umami-event="search-click" data-umami-event-url="' + escapeHtml(url) + '" tabindex="0">' +
                                '<div class="search-result-title">' +
                                escapeHtml(item.title || "") +
                                "</div>" +
                                '<div class="search-result-excerpt">' +
                                escapeHtml(excerpt) +
                                "</div>" +
                                "</a>" +
                                tags +
                                "</div>";
                        });
                        results.innerHTML = html;
                    })
                    .catch(function (err) {
                        if (err.name === "AbortError") return;
                        spinner.style.display = "none";
                        results.innerHTML =
                            '<div class="search-modal-message">Search is unavailable. Try again.</div>';
                    });
            }, 300);
        });

        results.addEventListener("click", function (e) {
            if (e.target.closest(".search-result-link")) closeModal();
        });

        function escapeHtml(str) {
            var div = document.createElement("div");
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function sanitizeUrl(url) {
            if (!url) return "";
            var tempUrl = url.trim();
            var match = tempUrl.match(/^[a-zA-Z][a-zA-Z0-9+.-]*:/);
            if (match) {
                var proto = match[0].toLowerCase();
                if (proto !== "http:" && proto !== "https:" && proto !== "mailto:" && proto !== "tel:") {
                    return "#";
                }
            }
            return tempUrl;
        }
    })();
</script>
