# Base URL used when generating links to your pages
# Set to the URL for your site
baseURL = "https://aiengineerguide.com"

# The name of this wonderful theme ;-).
theme = 'hugo-bearblog'

# Basic metadata configuration for your blog.
title = "AI Engineer Guide"
author = "Ashik Nesin"
copyright = "Copyright © 2024-2026, Nesin Technologies LLP."
languageCode = "en-US"
timeZone = "Asia/Kolkata"

# Generate a nice robots.txt for SEO
enableRobotsTXT = true

# Generate "Bearblog"-like URLs !only!, see https://bearblog.dev/.
[taxonomies]
  tag = "tags"

[permalinks]
  blog = "/blog/:slug/"
  til = "/til/:slug/"
  tags = "/tags/:slug/"

[sitemap]
  changefreq = "daily"
  filename = "sitemap.xml"
  priority = 0.5

[frontmatter]
  lastmod = ["lastmod", ":fileModTime", "date"]

[params]
  # The "description" of your website. This is used in the meta data of your generated html.
  description = "The daily read for engineers who want to actually build with AI — not just talk about it. Practical guides, TILs, and deep dives on Claude Code, MCP, agents, and modern AI tooling."
  authorName = "Ashik Nesin"
  authorEmail = "aiengineerguide@duck.com"

  # The path to your "favicon". This should be a square (at least 32px x 32px) png-file.
  # Hint: It's good practise to also put a "favicon.ico"-file into your "static"-folder.
  favicon = "images/logo-icon.svg"

  # These "images" are used for the structured data templates. This will show up, when
  # services like Twitter or Slack want to generate a preview of a link to your site.
  # See https://gohugo.io/templates/internal#twitter-cards and
  # https://gohugo.io/templates/internal#open-graph.
  images = ["images/share.png"]

  # Another "title" :-). This one is used as the site_name on the Hugo's internal
  # opengraph structured data template.
  # See https://ogp.me/ and https://gohugo.io/templates/internal#open-graph.
  title = "AIEngineerGuide.com"

  # This theme will, by default, inject a made-with-line at the bottom of the page.
  # You can turn it off, but we would really appreciate if you don't :-).
  hideMadeWithLine = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Render iframe and other things
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
[Params.umami]
  enabled = true
  websiteId = "d7df92fe-cb08-484d-adda-46e319b1fe3c"
  jsLocation = "https://hi.nesin.io/script.js"

[Params.posthog]
  enabled = true
  id = "phc_GG9IdGTih1B5PQxOVS4oiwQm01VsN0iKMadZA0ZW6Xr"
  
[Params.clarity]
  enabled = false
  id = "s880bgj9uz"
  
[Params.ogImage]
cloudinaryAccountId = "ashiknesin"
twitterHandle = "AshikNesin"
bgImagePath = "nesin_io/og-image-bg/dark-gradient"

[outputs]
  home = ["HTML", "RSS", "LLMSTXT"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.RSS]
    baseName = "feed"
  [outputFormats.LLMSTXT]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
